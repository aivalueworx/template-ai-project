name: Docs check

on:
  pull_request:
  push:
    branches: [main]

jobs:
  markdown-sanity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check required planning files exist
        run: |
          test -f plan/STACK-RECOMMENDER.md
          test -f plan/PROJECT-CLASSIFICATION.md
          test -f plan/ARCHITECTURE-DECISION.md
          test -f plan/DELIVERY-PHASES.md
          test -f plan/RISKS-AND-CONSTRAINTS.md
          test -f plan/REPO-SETUP.md
